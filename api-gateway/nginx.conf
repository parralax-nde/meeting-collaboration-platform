# Nginx configuration for the Meeting Collaboration Platform API Gateway.
# Routes all incoming requests to the appropriate upstream microservice.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstreams ──────────────────────────────────────────────────────────────

    upstream notes_service {
        server notes-service:8001;
    }

    upstream agenda_service {
        server agenda-service:8002;
    }

    upstream action_items_service {
        server action-items-service:8003;
    }

    upstream file_service {
        server file-service:8004;
    }

    upstream polls_service {
        server polls-service:8005;
    }

    # ── Server ─────────────────────────────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # Shared proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gateway health check
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Notes service ───────────────────────────────────────────────────
        location /api/notes/ {
            proxy_pass http://notes_service/;
        }

        # ── Agenda service ──────────────────────────────────────────────────
        location /api/agenda/ {
            proxy_pass http://agenda_service/;
        }

        # ── Action-items service ────────────────────────────────────────────
        location /api/action-items/ {
            proxy_pass http://action_items_service/;
        }

        # ── File service ────────────────────────────────────────────────────
        location /api/files/ {
            proxy_pass           http://file_service/;
            # 100 MB upload limit to accommodate meeting file attachments.
            client_max_body_size 100m;
        }

        # ── Polls service ───────────────────────────────────────────────────
        location /api/polls/ {
            proxy_pass http://polls_service/;
        }
    }
}
